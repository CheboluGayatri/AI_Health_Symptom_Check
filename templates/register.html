<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Symptom Checker - Register</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        clinical: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center transition-colors duration-300">

    <div class="absolute top-5 right-5 flex items-center gap-2">
        <!-- Dark Mode Toggle -->
        <button id="themeToggle" class="p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer">
            <i data-lucide="sun" class="w-5 h-5 text-amber-500 block dark:hidden"></i>
            <i data-lucide="moon" class="w-5 h-5 text-indigo-400 hidden dark:block"></i>
        </button>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-8 shadow-xl relative overflow-hidden backdrop-blur-md">
            
            <!-- Glow background effect -->
            <div class="absolute -top-16 -left-16 w-32 h-32 bg-clinical-500/10 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl"></div>

            <div class="text-center mb-8 relative z-10">
                <div class="inline-flex p-3 rounded-2xl bg-clinical-50 dark:bg-clinical-900/30 text-clinical-500 mb-4">
                    <i data-lucide="user-plus" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Patient Registration</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Create an account for diagnostics history</p>
            </div>

            <!-- Flask Flash Messaging -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-6 space-y-2">
                        {% for category, message in messages %}
                            <div class="p-4 rounded-xl text-sm font-medium {% if category == 'danger' %} bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-900/30 {% else %} bg-clinical-50 dark:bg-clinical-950/20 text-clinical-600 dark:text-clinical-400 border border-clinical-200 dark:border-clinical-900/30 {% endif %} flex items-center gap-2">
                                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="/register" method="POST" class="space-y-4 relative z-10">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">User Handle / Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" name="username" required placeholder="John Doe" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-clinical-500 dark:focus:ring-clinical-500 transition-all text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" name="email" required placeholder="name@domain.com" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-clinical-500 dark:focus:ring-clinical-500 transition-all text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Secure Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-clinical-500 dark:focus:ring-clinical-500 transition-all text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full py-3 px-4 rounded-xl bg-clinical-500 hover:bg-clinical-600 active:scale-[0.98] text-white font-semibold text-sm shadow-lg shadow-clinical-500/20 hover:shadow-clinical-500/30 transition-all cursor-pointer flex items-center justify-center gap-2 mt-6">
                    <span>Create Profile</span>
                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400 relative z-10">
                <span>Already registered? </span>
                <a href="/login" class="text-clinical-500 font-semibold hover:underline">Log In</a>
            </div>

        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
